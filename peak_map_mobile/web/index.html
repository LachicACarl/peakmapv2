<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="peak_map_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>peak_map_mobile</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = null;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>

  <script>
    // Suppress non-critical browser warnings that don't affect functionality
    const originalWarn = console.warn;
    console.warn = function(...args) {
      const message = args[0]?.toString() || '';
      
      // Suppress Intl deprecation warnings (using Intl.Segmenter instead of v8BreakIterator)
      if (message.includes('Intl.v8BreakIterator') || 
          message.includes('Intl.Segmenter') ||
          message.includes('deprecated')) {
        return;
      }
      
      // Suppress session history manipulation warnings from Flutter navigation
      if (message.includes('Session History') || 
          message.includes('history items will be skipped') ||
          message.includes('history manipulation intervention')) {
        return;
      }
      
      // Suppress deprecation warnings for mobile-web-app-capable
      if (message.includes('apple-mobile-web-app-capable')) {
        return;
      }
      
      // For other warnings, call the original console.warn
      return originalWarn.apply(console, args);
    };
  </script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
