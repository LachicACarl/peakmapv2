# Docker Compose for PEAK MAP - Full Stack

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./peak-map-backend
      dockerfile: Dockerfile
    container_name: peakmap-backend
    ports:
      - "8001:8000"  # Map host:8001 to container:8000
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/peakmap.db}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - FORCE_LOCAL_AUTH=${FORCE_LOCAL_AUTH:-false}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
    volumes:
      - backend-data:/app/data  # Persist SQLite database
      - ./peak-map-backend/app:/app/app  # Hot reload for development
    networks:
      - peakmap-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL Database (Optional - comment out if using Supabase)
