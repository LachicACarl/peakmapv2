  # Redis Cache (Optional)
  # redis:
  #   image: redis:7-alpine
  #   container_name: peakmap-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - peakmap-network
  #   restart: unless-stopped
  #   command: redis-server --appendonly yes
  #   healthcheck:
